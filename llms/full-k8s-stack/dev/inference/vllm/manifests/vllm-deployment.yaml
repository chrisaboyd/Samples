apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: inference
  labels:
    app.kubernetes.io/name: vllm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      serviceAccountName: default
      containers:
        - name: vllm
          image: vllm/vllm:latest
          command:
            - python
            - -m
            - vllm.entrypoints.openai.api_server
            - --model
            - mistralai/Mistral-7B-v0.1
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --tensor-parallel-size
            - "1"
          env:
            - name: MODEL_NAME
              value: "mistral-7b"
            - name: GPU_MEMORY_UTILIZATION
              value: "0.8"
            - name: MAX_MODEL_LEN
              value: "4096"
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: metrics
          resources:
            requests:
              nvidia.com/gpu: "1"
              cpu: "2"
              memory: "4Gi"
            limits:
              nvidia.com/gpu: "1"
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10