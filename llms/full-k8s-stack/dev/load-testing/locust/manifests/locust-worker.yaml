apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-worker
  namespace: load-testing
  labels:
    app.kubernetes.io/name: locust-worker
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/component: worker
      app.kubernetes.io/name: locust
  template:
    metadata:
      labels:
        app.kubernetes.io/component: worker
        app.kubernetes.io/name: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust:latest
          command:
            - locust
            - --worker
            - --master-host
            - locust-master.load-testing.svc.cluster.local
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi