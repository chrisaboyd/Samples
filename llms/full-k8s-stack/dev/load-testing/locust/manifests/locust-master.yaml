apiVersion: v1
kind: ConfigMap
metadata:
  name: locustfile
  namespace: load-testing
data:
  locustfile.py: |
    from locust import HttpUser, task, between

    class LLMGatewayUser(HttpUser):
        wait_time = between(1, 3)

        @task
        def chat_completion(self):
            self.client.post("/v1/chat/completions", json={
                "model": "gpt-3.5-turbo",
                "messages": [{"role": "user", "content": "Hello, how are you?"}]
            })
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: load-testing
  labels:
    app.kubernetes.io/name: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: master
      app.kubernetes.io/name: locust
  template:
    metadata:
      labels:
        app.kubernetes.io/component: master
        app.kubernetes.io/name: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust:latest
          command:
            - locust
            - --master
            - --host
            - http://litellm.litellm.svc.cluster.local:4000
            - --locustfile
            - /locust/locustfile.py
          ports:
            - containerPort: 8089
              name: http
            - containerPort: 5557
              name: rpc
          volumeMounts:
            - name: locustfile
              mountPath: /locust
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: locustfile
          configMap:
            name: locustfile
            items:
              - key: locustfile.py
                path: locustfile.py
---
apiVersion: v1
kind: Service
metadata:
  name: locust
  namespace: load-testing
  labels:
    app.kubernetes.io/name: locust
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8089
      targetPort: 8089
    - name: rpc
      port: 5557
      targetPort: 5557
  selector:
    app.kubernetes.io/component: master
    app.kubernetes.io/name: locust