apiVersion: apps/v1
kind: Deployment
metadata:
  name: locust-master
  namespace: load-testing
  labels:
    app.kubernetes.io/name: locust-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/component: master
      app.kubernetes.io/name: locust
  template:
    metadata:
      labels:
        app.kubernetes.io/component: master
        app.kubernetes.io/name: locust
    spec:
      containers:
        - name: locust
          image: locustio/locust:latest
          command:
            - locust
            - --master
            - --headless
            - --host
            - http://litellm.gateway.svc.cluster.local:8000
            - --users
            - "100"
            - --spawn-rate
            - "10"
          ports:
            - containerPort: 8089
              name: http
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: locust
  namespace: load-testing
  labels:
    app.kubernetes.io/name: locust
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8089
      targetPort: 8089
  selector:
    app.kubernetes.io/component: master
    app.kubernetes.io/name: locust