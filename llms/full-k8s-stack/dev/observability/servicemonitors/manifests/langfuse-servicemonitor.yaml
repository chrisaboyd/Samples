apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: langfuse
  namespace: observability
  labels:
    app.kubernetes.io/name: langfuse
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-web
  namespaceSelector:
    matchNames:
      - observability
  endpoints:
    - port: http
      interval: 30s
      path: /api/public/health