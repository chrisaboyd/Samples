apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: dcgm-exporter
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dcgm-exporter
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      priorityClassName: system-node-critical
      containers:
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5
          args:
            - "-address=:8080"
            - "-collectors=/etc/dcgm-exporter/dcgm-metrics.yaml"
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: dcgm-metrics
              mountPath: /etc/dcgm-exporter
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 200m
              memory: 512Mi
          securityContext:
            runAsUser: 0
            privileged: true
      volumes:
        - name: dcgm-metrics
          configMap:
            name: dcgm-metrics
      tolerations:
        - operator: Exists
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: observability
  labels:
    app.kubernetes.io/name: dcgm-exporter
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: dcgm-exporter
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dcgm-metrics
  namespace: observability
data:
  dcgm-metrics.yaml: |
    dcgm_gpu_utilization
    dcgm_fb_used_percentage
    dcgm_fb_free_percentage
    dcgm_sm_active
    dcgm_sm_ecc_corrected
    dcgm_sm_ecc_uncorrected
    dcgm_memory_clock
    dcgm_sm_clock
    dcgm_pcie_tx_bytes
    dcgm_pcie_rx_bytes
    dcgm_power_draw