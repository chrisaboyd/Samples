apiVersion: apps/v1
kind: Deployment
metadata:
  name: langfuse-web
  namespace: observability
  labels:
    app.kubernetes.io/name: langfuse-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: langfuse-web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: langfuse-web
    spec:
      containers:
        - name: web
          image: langfuse/langfuse:latest
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              value: "postgresql://langfuse:langfuse-password@postgres.platform.svc.cluster.local:5432/langfuse"
            - name: CLICKHOUSE_URL
              value: "clickhouse.observability.svc.cluster.local"
            - name: REDIS_CONNECTION_STRING
              value: "redis://redis.platform.svc.cluster.local:6379"
            - name: S3_ENDPOINT
              value: "seaweedfs-filer.platform.svc.cluster.local:8333"
            - name: S3_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-secret
                  key: s3-access-key
            - name: S3_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-secret
                  key: s3-secret-key
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: next-auth-secret
            - name: SALT
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: salt
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: langfuse-secrets
                  key: encryption-key
            - name: NEXTAUTH_URL
              value: "http://langfuse.observability.svc.cluster.local:3000"
            - name: LANGFUSE_HOST
              value: "http://langfuse.observability.svc.cluster.local"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: langfuse
  namespace: observability
  labels:
    app.kubernetes.io/name: langfuse-web
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3000
      targetPort: 3000
  selector:
    app.kubernetes.io/name: langfuse-web