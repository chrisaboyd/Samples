# Prometheus Operator CRDs - minimal set for ServiceMonitor support
# These are the core CRDs needed for monitoring components
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: servicemonitors.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  names:
    kind: ServiceMonitor
    listKind: ServiceMonitorList
    plural: servicemonitors
    singular: servicemonitor
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: ServiceMonitor defines monitoring for a set of services.
          properties:
            spec:
              type: object
              properties:
                jobLabel:
                  type: string
                endpoints:
                  type: array
                  items:
                    type: object
                    properties:
                      port:
                        type: string
                      path:
                        type: string
                      interval:
                        type: string
                namespaceSelector:
                  type: object
                  properties:
                    matchNames:
                      type: array
                      items:
                        type: string
                selector:
                  type: object
---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: prometheuses.monitoring.coreos.com
spec:
  group: monitoring.coreos.com
  names:
    kind: Prometheus
    listKind: PrometheusList
    plural: prometheuses
    singular: prometheus
  scope: Namespaced
  versions:
    - name: v1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object