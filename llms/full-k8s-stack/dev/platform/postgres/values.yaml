# Bitnami PostgreSQL values for dev
auth:
  existingSecret: postgres-secret
  secretKeys:
    adminPasswordKey: postgres-password
    userPasswordKey: password
  database: litellm
  username: litellm
  
primary:
  persistence:
    enabled: true
    size: 10Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 500m
      memory: 1Gi
    limits:
      cpu: 1
      memory: 2Gi
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "9187"
    
readReplica:
  enabled: false

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: observability
    interval: 30s