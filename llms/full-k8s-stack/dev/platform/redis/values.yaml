# Redis values for dev
architecture: standalone

auth:
  enabled: true

primary:
  persistence:
    enabled: true
    size: 5Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

metrics:
  enabled: true
  serviceMonitor:
    enabled: true
    namespace: observability