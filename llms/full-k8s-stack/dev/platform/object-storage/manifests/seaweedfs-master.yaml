apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-master
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-master
spec:
  type: ClusterIP
  ports:
    - name: master
      port: 9333
      targetPort: 9333
  selector:
    app.kubernetes.io/name: seaweedfs-master
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-master
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-master
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs-master
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs-master
    spec:
      containers:
        - name: master
          image: chrislusf/seaweedfs:master
          command:
            - /usr/bin/weed
            - master
            - -ip=0.0.0.0
          ports:
            - containerPort: 9333
              name: master
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /status
              port: 9333
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 9333
            initialDelaySeconds: 30
            periodSeconds: 30