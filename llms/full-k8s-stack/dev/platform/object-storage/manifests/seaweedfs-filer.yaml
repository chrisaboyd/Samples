apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-filer
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-filer
spec:
  type: ClusterIP
  ports:
    - name: filer
      port: 8888
      targetPort: 8888
    - name: s3
      port: 8333
      targetPort: 8333
  selector:
    app.kubernetes.io/name: seaweedfs-filer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-filer
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-filer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs-filer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs-filer
    spec:
      containers:
        - name: filer
          image: chrislusf/seaweedfs:master
          command:
            - /usr/bin/weed
            - filer
            - -master=seaweedfs-master.platform.svc.cluster.local:9333
            - -ip=0.0.0.0
          ports:
            - containerPort: 8888
              name: filer
        - name: s3
          image: chrislusf/seaweedfs:master
          command:
            - /usr/bin/weed
            - s3
            - -filer=seaweedfs-filer.platform.svc.cluster.local:8888
            - -ip=0.0.0.0
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-secret
                  key: s3-access-key
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: seaweedfs-secret
                  key: s3-secret-key
          ports:
            - containerPort: 8333
              name: s3
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-filer-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-filer-data
  namespace: platform
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: local-path
  resources:
    requests:
      storage: 1Gi