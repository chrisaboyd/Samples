apiVersion: v1
kind: Service
metadata:
  name: seaweedfs-volume
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-volume
spec:
  type: ClusterIP
  ports:
    - name: volume
      port: 8080
      targetPort: 8080
  selector:
    app.kubernetes.io/name: seaweedfs-volume
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs-volume
  namespace: platform
  labels:
    app.kubernetes.io/name: seaweedfs-volume
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: seaweedfs-volume
  template:
    metadata:
      labels:
        app.kubernetes.io/name: seaweedfs-volume
    spec:
      containers:
        - name: volume
          image: chrislusf/seaweedfs:master
          command:
            - /usr/bin/weed
            - volume
            - -mserver=seaweedfs-master.platform.svc.cluster.local:9333
            - -ip=0.0.0.0
          ports:
            - containerPort: 8080
              name: volume
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /status
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: seaweedfs-volume-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: seaweedfs-volume-data
  namespace: platform
spec:
  accessModes: [ "ReadWriteOnce" ]
  storageClassName: local-path
  resources:
    requests:
      storage: 10Gi