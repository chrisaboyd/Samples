apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-guard
  namespace: guardrails
  labels:
    app.kubernetes.io/name: llm-guard
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: llm-guard
  template:
    metadata:
      labels:
        app.kubernetes.io/name: llm-guard
    spec:
      containers:
        - name: llm-guard
          image: ghcr.io/protectai/llm-guard:latest
          command:
            - python
            - -m
            - llm_guard
            - --host
            - 0.0.0.0
            - --port
            - "8000"
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: llm-guard
  namespace: guardrails
  labels:
    app.kubernetes.io/name: llm-guard
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8000
      targetPort: 8000
  selector:
    app.kubernetes.io/name: llm-guard