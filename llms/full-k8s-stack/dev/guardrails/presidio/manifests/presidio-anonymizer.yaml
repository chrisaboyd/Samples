apiVersion: apps/v1
kind: Deployment
metadata:
  name: presidio-anonymizer
  namespace: guardrails
  labels:
    app.kubernetes.io/name: presidio-anonymizer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: presidio-anonymizer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presidio-anonymizer
    spec:
      containers:
        - name: anonymizer
          image: mcr.microsoft.com/presidio/presidio-anonymizer:2.1
          ports:
            - containerPort: 3001
              name: http
          env:
            - name: LOG_LEVEL
              value: "INFO"
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3001
            initialDelaySeconds: 30
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: presidio-anonymizer
  namespace: guardrails
  labels:
    app.kubernetes.io/name: presidio-anonymizer
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 3001
      targetPort: 3001
  selector:
    app.kubernetes.io/name: presidio-anonymizer