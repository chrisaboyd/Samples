apiVersion: apps/v1
kind: Deployment
metadata:
  name: litellm
  namespace: gateway
  labels:
    app.kubernetes.io/name: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: litellm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: litellm
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8001"
    spec:
      containers:
        - name: litellm
          image: ghcr.io/berriai/litellm:main-latest
          args:
            - --host
            - 0.0.0.0
            - --port
            - "8000"
            - --num_workers
            - "2"
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: litellm-postgres
                  key: database-url
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: litellm-secrets
                  key: master-key
            - name: LANGFUSE_HOST
              value: "http://langfuse.observability.svc.cluster.local"
            - name: OPENAI_API_BASE
              value: "http://vllm.inference.svc.cluster.local:8000/v1"
            - name: REDIS_URL
              value: "redis://redis.platform.svc.cluster.local:6379"
          ports:
            - containerPort: 8000
              name: http
            - containerPort: 8001
              name: metrics
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 1
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 30