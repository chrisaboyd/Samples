apiVersion: v1
kind: Secret
metadata:
  name: litellm-postgres
  namespace: gateway
type: Opaque
stringData:
  # Template value - replace in your environment
  database-url: "postgresql://litellm:litellm-password@postgres.platform.svc.cluster.local:5432/litellm"
---
apiVersion: v1
kind: Secret
metadata:
  name: litellm-secrets
  namespace: gateway
type: Opaque
stringData:
  # Template value - replace in your environment
  master-key: "sk-litellm-master-key-change-me"