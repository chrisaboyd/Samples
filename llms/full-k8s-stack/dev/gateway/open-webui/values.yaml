image:
  repository: ghcr.io/open-webui/open-webui
  tag: main
  pullPolicy: IfNotPresent

env:
  - name: OPENAI_API_BASE_URL
    value: "http://litellm.gateway.svc.cluster.local:8000"
  - name: WEBUI_AUTH
    value: "false"

service:
  type: ClusterIP
  port: 8080

persistence:
  enabled: true
  size: 5Gi
