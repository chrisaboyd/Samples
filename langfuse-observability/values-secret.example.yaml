# Template for values-secret.yaml. Copy to values-secret.yaml and fill in real
# values (or generate them with the snippet in README.md). The real file is
# gitignored; never commit it.
langfuse:
  salt:
    value: "REPLACE_openssl_rand_base64_32"
  nextauth:
    secret:
      value: "REPLACE_openssl_rand_base64_32"
  encryptionKey:
    value: "REPLACE_openssl_rand_hex_32" # must be exactly 64 hex chars
postgresql:
  auth:
    password: "REPLACE_openssl_rand_hex_16"
redis:
  auth:
    password: "REPLACE_openssl_rand_hex_16"
clickhouse:
  auth:
    password: "REPLACE_openssl_rand_hex_16"
s3:
  auth:
    rootPassword: "REPLACE_openssl_rand_hex_16"
